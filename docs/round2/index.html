<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>N3 單字卡 第二輪</title>
    <meta name="theme-color" content="#f7f4ee" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="N3 單字卡 第二輪" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <link rel="manifest" href="./manifest.json" />
    <style>
      :root { --paper: #f7f4ee; --ink: #2f2c28; --muted: #746f67; --line: #d8d1c5; --soft: #ebe6dc; --accent: #8a2f25; --accent-soft: #eadbd6; --white: #fffdf8; }
      * { box-sizing: border-box; }
      body { margin: 0; min-height: 100vh; background: var(--paper); color: var(--ink); font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Hiragino Kaku Gothic ProN", "Yu Gothic", "Noto Sans TC", sans-serif; letter-spacing: 0; }
      main { width: min(880px, calc(100% - 32px)); margin: 0 auto; padding: 40px 0 28px; }
      header { display: flex; align-items: end; justify-content: space-between; gap: 20px; padding-bottom: 22px; border-bottom: 1px solid var(--line); }
      h1 { margin: 0; font-size: clamp(28px, 5vw, 48px); font-weight: 500; }
      .subhead { margin: 8px 0 0; color: var(--muted); font-size: 14px; }
      .count { color: var(--muted); font-size: 14px; white-space: nowrap; }
      .study { display: grid; grid-template-columns: 1fr; gap: 18px; padding: 32px 0 22px; }
      .card-shell { position: relative; min-height: 340px; border: 1px solid var(--line); background: var(--white); display: grid; place-items: center; padding: 34px; }
      .card { width: 100%; max-width: 620px; text-align: center; }
      .copy-tools { position: absolute; top: 8px; right: 8px; display: flex; align-items: center; gap: 4px; }
      .copy-status { color: var(--muted); font-size: 13px; opacity: 0; pointer-events: none; transition: opacity 120ms ease; white-space: nowrap; }
      .copy-status.show { opacity: 1; }
      .copy-btn { width: 40px; height: 40px; min-height: 40px; padding: 0; display: grid; place-items: center; font-size: 22px; line-height: 1; }
      .label { color: var(--muted); font-size: 13px; margin-bottom: 18px; }
      .front { font-size: clamp(48px, 12vw, 96px); line-height: 1.1; font-weight: 400; }
      .kanji { font-size: clamp(34px, 8vw, 64px); line-height: 1.15; font-weight: 500; margin-bottom: 14px; }
      .word-reading { color: var(--muted); font-size: 16px; margin-bottom: 10px; }
      .meaning { color: var(--accent); font-size: 20px; margin-bottom: 22px; }
      .example { width: min(100%, 560px); margin: 0 auto; padding-top: 20px; border-top: 1px solid var(--line); font-size: 20px; line-height: 1.7; }
      .example-reading { width: min(100%, 560px); margin: 8px auto 0; color: var(--muted); font-size: 16px; line-height: 1.7; }
      .example-meaning { width: min(100%, 560px); margin: 8px auto 0; color: var(--ink); font-size: 16px; line-height: 1.7; }
      .controls { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 10px; }
      button { min-height: 46px; border: 1px solid var(--line); background: var(--white); color: var(--ink); font: inherit; cursor: pointer; }
      button:hover { background: var(--soft); }
      button:focus-visible { outline: 3px solid var(--accent-soft); outline-offset: 2px; }
      .primary { background: var(--ink); border-color: var(--ink); color: var(--white); }
      .primary:hover { background: #1f1d1a; }
      .progress-wrap { height: 4px; background: var(--soft); }
      .progress { width: 0%; height: 100%; background: var(--accent); transition: width 160ms ease; }
      details { border-top: 1px solid var(--line); padding-top: 18px; }
      summary { cursor: pointer; color: var(--muted); margin-bottom: 14px; }
      .list { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 8px; margin: 0; padding: 0; list-style: none; }
      .list li { border: 1px solid var(--line); background: rgba(255, 253, 248, 0.68); padding: 10px 12px; font-size: 14px; }
      .front-only .back-content, .back-only .front-content { display: none; }
      @media (max-width: 640px) { main { width: min(100% - 22px, 880px); padding-top: 24px; } header { display: block; } .count { margin-top: 12px; } .card-shell { min-height: 330px; padding: 24px 18px; } .controls { grid-template-columns: 1fr 1fr; } #nextBtn { order: 2; } #flipBtn { order: 3; } #shuffleBtn { order: 4; } .example { font-size: 18px; } }
    </style>
  </head>
  <body>
    <main>
      <header><div><h1>N3 單字卡 第二輪</h1><p class="subhead">第二輪單字卡。正面是平假名，背面是漢字、意思和例句。每輪 51 張，順序隨機。</p></div><div class="count" id="counter">1 / 51</div></header>
      <section class="study" aria-label="單字卡練習">
        <div class="progress-wrap" aria-hidden="true"><div class="progress" id="progress"></div></div>
        <div class="card-shell front-only" id="cardShell"><div class="copy-tools"><span class="copy-status" id="copyStatus">Copy Success</span><button type="button" class="copy-btn" id="copyBtn" aria-label="Copy word" title="Copy word">⧉</button></div><article class="card" aria-live="polite"><div class="front-content"><div class="label">正面</div><div class="front" id="frontText"></div></div><div class="back-content"><div class="label">背面</div><div class="word-reading" id="wordReadingText"></div><div class="kanji" id="kanjiText"></div><div class="meaning" id="meaningText"></div><div class="example" id="exampleText"></div><div class="example-reading" id="exampleReadingText"></div><div class="example-meaning" id="exampleMeaningText"></div></div></article></div>
        <div class="controls"><button type="button" id="prevBtn">上一張</button><button type="button" class="primary" id="flipBtn">翻面</button><button type="button" id="nextBtn">下一張</button><button type="button" id="shuffleBtn">重新洗牌</button></div>
      </section>
      <details><summary>查看本輪單字</summary><ul class="list" id="wordList"></ul></details>
    </main>
    <script>
      const cards = [{"kana":"きょうか","kanji":"教科","accent":"-","meaning":"科目、大科別","example":"学校で新しい教科を勉強します。","exampleReading":"がっこうであたらしいきょうかをべんきょうします。","exampleMeaning":"在學校學習新的科目。"},{"kana":"かもく","kanji":"科目","accent":"-","meaning":"科目、小科別","example":"今学期は五つの科目を取っています。","exampleReading":"こんがっきはいつつのかもくをとっています。","exampleMeaning":"這學期我修了五個科目。"},{"kana":"しはつ","kanji":"始発","accent":"-","meaning":"首班車","example":"明日は始発に乗って空港へ行きます。","exampleReading":"あしたはしはつにのってくうこうへいきます。","exampleMeaning":"明天我要搭首班車去機場。"},{"kana":"しゅうでん","kanji":"終電","accent":"-","meaning":"末班車","example":"終電に間に合うように急ぎました。","exampleReading":"しゅうでんにまにあうようにいそぎました。","exampleMeaning":"我為了趕上末班車而加快腳步。"},{"kana":"しゅうてん","kanji":"終点","accent":"-","meaning":"終點站","example":"この電車の終点は東京駅です。","exampleReading":"このでんしゃのしゅうてんはとうきょうえきです。","exampleMeaning":"這班電車的終點站是東京車站。"},{"kana":"のぼり","kanji":"上り","accent":"-","meaning":"上行、北上","example":"上りの電車は少し遅れています。","exampleReading":"のぼりのでんしゃはすこしおくれています。","exampleMeaning":"上行的電車有點誤點。"},{"kana":"くだり","kanji":"下り","accent":"-","meaning":"下行、南下","example":"下りのホームは反対側です。","exampleReading":"くだりのほーむははんたいがわです。","exampleMeaning":"下行月台在對面。"},{"kana":"こくりつ","kanji":"国立","accent":"-","meaning":"國立","example":"兄は国立大学を目指しています。","exampleReading":"あにはこくりつだいがくをめざしています。","exampleMeaning":"哥哥以國立大學為目標。"},{"kana":"こうりつ","kanji":"公立","accent":"-","meaning":"公立","example":"妹は公立の高校に通っています。","exampleReading":"いもうとはこうりつのこうこうにかよっています。","exampleMeaning":"妹妹就讀公立高中。"},{"kana":"しりつ","kanji":"私立","accent":"-","meaning":"私立","example":"この町には私立の学校が多いです。","exampleReading":"このまちにはしりつのがっこうがおおいです。","exampleMeaning":"這個城鎮有很多私立學校。"},{"kana":"おしゃべり","kanji":"おしゃべりする","accent":"-","meaning":"聊天","example":"友達とカフェでおしゃべりしました。","exampleReading":"ともだちとかふぇでおしゃべりしました。","exampleMeaning":"我和朋友在咖啡店聊天。"},{"kana":"りらっくす","kanji":"リラックスする","accent":"-","meaning":"放鬆","example":"音楽を聞いてリラックスします。","exampleReading":"おんがくをきいてりらっくすします。","exampleMeaning":"我聽音樂放鬆。"},{"kana":"ひるね","kanji":"昼寝する","accent":"-","meaning":"午睡","example":"昼ご飯の後で少し昼寝しました。","exampleReading":"ひるごはんのあとですこしひるねしました。","exampleMeaning":"午飯後我稍微睡了午覺。"},{"kana":"よふかし","kanji":"夜更かしする","accent":"-","meaning":"熬夜","example":"試験の前に夜更かししないほうがいいです。","exampleReading":"しけんのまえによふかししないほうがいいです。","exampleMeaning":"考試前最好不要熬夜。"},{"kana":"てつや","kanji":"徹夜する","accent":"-","meaning":"通宵","example":"レポートを書くために徹夜しました。","exampleReading":"れぽーとをかくためにてつやしました。","exampleMeaning":"我為了寫報告通宵了。"},{"kana":"ぼしゅう","kanji":"募集する","accent":"-","meaning":"招募","example":"会社は新しいスタッフを募集しています。","exampleReading":"かいしゃはあたらしいすたっふをぼしゅうしています。","exampleMeaning":"公司正在招募新的員工。"},{"kana":"おうぼ","kanji":"応募する","accent":"-","meaning":"報名、應徵","example":"好きな会社の仕事に応募しました。","exampleReading":"すきなかいしゃのしごとにおうぼしました。","exampleMeaning":"我應徵了喜歡的公司的工作。"},{"kana":"いんたびゅー","kanji":"インタビューする","accent":"-","meaning":"採訪","example":"記者は有名な選手にインタビューしました。","exampleReading":"きしゃはゆうめいなせんしゅにいんたびゅーしました。","exampleMeaning":"記者採訪了有名的選手。"},{"kana":"とうろく","kanji":"登録する","accent":"-","meaning":"登錄、註冊","example":"新しいサービスにメールアドレスを登録しました。","exampleReading":"あたらしいさーびすにめーるあどれすをとうろくしました。","exampleMeaning":"我在新的服務註冊了電子信箱。"},{"kana":"てつづき","kanji":"手続きする","accent":"-","meaning":"手續","example":"引っ越しの手続きを早めにします。","exampleReading":"ひっこしのてつづきをはやめにします。","exampleMeaning":"我會提早辦搬家的手續。"},{"kana":"ていしゅつ","kanji":"提出する","accent":"-","meaning":"提交、提出","example":"先生に宿題を提出しました。","exampleReading":"せんせいにしゅくだいをていしゅつしました。","exampleMeaning":"我向老師提交了作業。"},{"kana":"きにゅう","kanji":"記入する","accent":"-","meaning":"填入","example":"申込書に名前と住所を記入してください。","exampleReading":"もうしこみしょになまえとじゅうしょをきにゅうしてください。","exampleMeaning":"請在申請表填入姓名和地址。"},{"kana":"かいとう","kanji":"回答する","accent":"-","meaning":"回答","example":"アンケートの質問に回答しました。","exampleReading":"あんけーとのしつもんにかいとうしました。","exampleMeaning":"我回答了問卷的問題。"},{"kana":"ちょうせい","kanji":"調整する","accent":"-","meaning":"調整","example":"会議の時間を調整しました。","exampleReading":"かいぎのじかんをちょうせいしました。","exampleMeaning":"我調整了會議時間。"},{"kana":"めいれい","kanji":"命令する","accent":"-","meaning":"命令","example":"上司は部下にすぐ来るように命令しました。","exampleReading":"じょうしはぶかにすぐくるようにめいれいしました。","exampleMeaning":"上司命令部下馬上過來。"},{"kana":"しじ","kanji":"指示する","accent":"-","meaning":"指示","example":"先生は学生に作業の方法を指示しました。","exampleReading":"せんせいはがくせいにさぎょうのほうほうをしじしました。","exampleMeaning":"老師指示學生作業的方法。"},{"kana":"めんどう","kanji":"面倒","accent":"-","meaning":"麻煩","example":"この手続きは少し面倒です。","exampleReading":"このてつづきはすこしめんどうです。","exampleMeaning":"這個手續有點麻煩。"},{"kana":"きよう","kanji":"器用","accent":"-","meaning":"靈巧","example":"彼女は手先が器用です。","exampleReading":"かのじょはてさきがきようです。","exampleMeaning":"她手很靈巧。"},{"kana":"りこう","kanji":"利口","accent":"-","meaning":"機靈、聰明","example":"その子はとても利口です。","exampleReading":"そのこはとてもりこうです。","exampleMeaning":"那個孩子非常聰明。"},{"kana":"とくい","kanji":"得意","accent":"-","meaning":"擅長","example":"私は料理が得意です。","exampleReading":"わたしはりょうりがとくいです。","exampleMeaning":"我擅長料理。"},{"kana":"すまーと","kanji":"スマート","accent":"-","meaning":"聰明、俐落","example":"彼の説明はスマートでわかりやすいです。","exampleReading":"かれのせつめいはすまーとでわかりやすいです。","exampleMeaning":"他的說明俐落又容易懂。"},{"kana":"せっきょくてき","kanji":"積極的","accent":"-","meaning":"積極","example":"彼は積極的に意見を言います。","exampleReading":"かれはせっきょくてきにいけんをいいます。","exampleMeaning":"他積極地表達意見。"},{"kana":"しょうきょくてき","kanji":"消極的","accent":"-","meaning":"消極","example":"彼女は新しい仕事に少し消極的です。","exampleReading":"かのじょはあたらしいしごとにすこししょうきょくてきです。","exampleMeaning":"她對新的工作有點消極。"},{"kana":"ふしぎ","kanji":"不思議","accent":"-","meaning":"不可思議","example":"この話はとても不思議です。","exampleReading":"このはなしはとてもふしぎです。","exampleMeaning":"這個故事非常不可思議。"},{"kana":"さわやか","kanji":"さわやか","accent":"-","meaning":"清爽","example":"朝の風がさわやかでした。","exampleReading":"あさのかぜがさわやかでした。","exampleMeaning":"早晨的風很清爽。"},{"kana":"しんせん","kanji":"新鮮","accent":"-","meaning":"新鮮","example":"この店の魚は新鮮です。","exampleReading":"このみせのさかなはしんせんです。","exampleMeaning":"這家店的魚很新鮮。"},{"kana":"せいけつ","kanji":"清潔","accent":"-","meaning":"乾淨","example":"部屋をいつも清潔にしています。","exampleReading":"へやをいつもせいけつにしています。","exampleMeaning":"我總是保持房間乾淨。"},{"kana":"つらい","kanji":"つらい","accent":"-","meaning":"辛苦、難過","example":"一人で全部するのはつらいです。","exampleReading":"ひとりでぜんぶするのはつらいです。","exampleMeaning":"一個人全部做很辛苦。"},{"kana":"きつい","kanji":"きつい","accent":"-","meaning":"費力、嚴厲、緊","example":"この仕事は思ったよりきついです。","exampleReading":"このしごとはおもったよりきついです。","exampleMeaning":"這份工作比想像中吃力。"},{"kana":"かしこい","kanji":"かしこい","accent":"-","meaning":"聰明","example":"この犬はとてもかしこいです。","exampleReading":"このいぬはとてもかしこいです。","exampleMeaning":"這隻狗非常聰明。"},{"kana":"するどい","kanji":"鋭い","accent":"-","meaning":"敏銳、銳利","example":"彼は鋭い質問をしました。","exampleReading":"かれはするどいしつもんをしました。","exampleMeaning":"他提出了敏銳的問題。"},{"kana":"にぶい","kanji":"鈍い","accent":"-","meaning":"遲鈍","example":"今日は頭の働きが少し鈍いです。","exampleReading":"きょうはあたまのはたらきがすこしにぶいです。","exampleMeaning":"今天腦袋運轉有點遲鈍。"},{"kana":"そそっかしい","kanji":"そそっかしい","accent":"-","meaning":"慌張、粗心","example":"弟はそそっかしくてよく忘れ物をします。","exampleReading":"おとうとはそそっかしくてよくわすれものをします。","exampleMeaning":"弟弟很粗心，常常忘東西。"},{"kana":"ずうずうしい","kanji":"図々しい","accent":"-","meaning":"厚臉皮","example":"彼の頼み方は少し図々しいです。","exampleReading":"かれのたのみかたはすこしずうずうしいです。","exampleMeaning":"他拜託人的方式有點厚臉皮。"},{"kana":"ずるい","kanji":"ずるい","accent":"-","meaning":"狡猾","example":"うそをつくのはずるいです。","exampleReading":"うそをつくのはずるいです。","exampleMeaning":"說謊很狡猾。"},{"kana":"しつこい","kanji":"しつこい","accent":"-","meaning":"糾纏不休","example":"しつこい質問に少し困りました。","exampleReading":"しつこいしつもんにすこしこまりました。","exampleMeaning":"我被糾纏不休的問題弄得有點困擾。"},{"kana":"ひとなつっこい","kanji":"人懐っこい","accent":"-","meaning":"親人、容易親近","example":"彼女の猫は人懐っこいです。","exampleReading":"かのじょのねこはひとなつっこいです。","exampleMeaning":"她的貓很親人。"},{"kana":"おさない","kanji":"幼い","accent":"-","meaning":"幼小","example":"幼い子供には難しい説明です。","exampleReading":"おさないこどもにはむずかしいせつめいです。","exampleMeaning":"這是對幼小孩子來說很難的說明。"},{"kana":"たしかに","kanji":"確かに","accent":"-","meaning":"確實","example":"確かに彼の言うことは正しいです。","exampleReading":"たしかにかれのいうことはただしいです。","exampleMeaning":"他的話確實是對的。"},{"kana":"たしか","kanji":"確か","accent":"-","meaning":"確實、大概記得","example":"確か明日は休みだったと思います。","exampleReading":"たしかあしたはやすみだったとおもいます。","exampleMeaning":"我記得明天應該是休假。"},{"kana":"もちろん","kanji":"もちろん","accent":"-","meaning":"當然","example":"もちろん一緒に行きます。","exampleReading":"もちろんいっしょにいきます。","exampleMeaning":"當然會一起去。"}];
      const state = { order: [], index: 0, showingBack: false };
      const cardShell = document.getElementById("cardShell"); const frontText = document.getElementById("frontText"); const wordReadingText = document.getElementById("wordReadingText"); const kanjiText = document.getElementById("kanjiText"); const meaningText = document.getElementById("meaningText"); const exampleText = document.getElementById("exampleText"); const exampleReadingText = document.getElementById("exampleReadingText"); const exampleMeaningText = document.getElementById("exampleMeaningText"); const copyBtn = document.getElementById("copyBtn"); const copyStatus = document.getElementById("copyStatus"); const counter = document.getElementById("counter"); const progress = document.getElementById("progress"); const wordList = document.getElementById("wordList"); let copyTimer;
      function shuffle(array) { const result = [...array]; for (let i = result.length - 1; i > 0; i -= 1) { const j = Math.floor(Math.random() * (i + 1)); [result[i], result[j]] = [result[j], result[i]]; } return result; }
      function currentCard() { return cards[state.order[state.index]]; }
      function render() { const card = currentCard(); frontText.textContent = card.kana; wordReadingText.textContent = `${card.kana} [${card.accent}]`; kanjiText.textContent = card.kanji; meaningText.textContent = card.meaning; exampleText.textContent = card.example; exampleReadingText.textContent = card.exampleReading; exampleMeaningText.textContent = card.exampleMeaning; counter.textContent = `${state.index + 1} / ${cards.length}`; progress.style.width = `${((state.index + 1) / cards.length) * 100}%`; cardShell.className = `card-shell ${state.showingBack ? "back-only" : "front-only"}`; document.getElementById("flipBtn").textContent = state.showingBack ? "看正面" : "翻面"; }
      function renderWordList() { wordList.innerHTML = ""; state.order.forEach((cardIndex) => { const card = cards[cardIndex]; const item = document.createElement("li"); item.textContent = `${card.kana} / ${card.kanji}`; wordList.appendChild(item); }); }
      function resetDeck() { state.order = shuffle(cards.map((_, index) => index)); state.index = 0; state.showingBack = false; render(); renderWordList(); }
      function move(delta) { state.index = (state.index + delta + cards.length) % cards.length; state.showingBack = false; render(); }
      async function copyCurrentWord() { const card = currentCard(); const text = `${card.kanji}（${card.kana}）`; try { await navigator.clipboard.writeText(text); } catch { const textarea = document.createElement("textarea"); textarea.value = text; textarea.setAttribute("readonly", ""); textarea.style.position = "fixed"; textarea.style.opacity = "0"; document.body.appendChild(textarea); textarea.select(); document.execCommand("copy"); textarea.remove(); } copyStatus.classList.add("show"); clearTimeout(copyTimer); copyTimer = setTimeout(() => { copyStatus.classList.remove("show"); }, 1000); }
      document.getElementById("flipBtn").addEventListener("click", () => { state.showingBack = !state.showingBack; render(); }); copyBtn.addEventListener("click", copyCurrentWord); document.getElementById("nextBtn").addEventListener("click", () => move(1)); document.getElementById("prevBtn").addEventListener("click", () => move(-1)); document.getElementById("shuffleBtn").addEventListener("click", resetDeck); document.addEventListener("keydown", (event) => { if (event.key === " ") { event.preventDefault(); state.showingBack = !state.showingBack; render(); } if (event.key === "ArrowRight") move(1); if (event.key === "ArrowLeft") move(-1); }); if ("serviceWorker" in navigator) { window.addEventListener("load", () => { navigator.serviceWorker.register("./service-worker.js").then((registration) => { registration.update(); }); }); } resetDeck();
    </script>
  </body>
